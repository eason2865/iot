services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: iot-etcd
    restart: unless-stopped
    ports:
      - "2379:2379"
      - "2380:2380"
    command:
      - /usr/local/bin/etcd
      - --name
      - etcd-1
      - --data-dir
      - /etcd-data
      - --listen-client-urls
      - http://0.0.0.0:2379
      - --advertise-client-urls
      - http://127.0.0.1:2379
      - --listen-peer-urls
      - http://0.0.0.0:2380
      - --initial-advertise-peer-urls
      - http://127.0.0.1:2380
      - --initial-cluster
      - etcd-1=http://127.0.0.1:2380
      - --initial-cluster-token
      - iot-etcd
      - --initial-cluster-state
      - new
    volumes:
      - etcd-data:/etcd-data

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: iot-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.2
    container_name: iot-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - etcd
      - prometheus

  demo:
    image: iot-app:metrics2
    container_name: iot-demo
    restart: unless-stopped
    command: ["/usr/local/bin/demo"]
    ports:
      - "18084:8080"
    environment:
      DEMO_ADMIN_URL: http://host.docker.internal:18080
      DEMO_MQTT_URL: tcp://host.docker.internal:1883
      DEMO_TENANT_COUNT: "5"
      DEMO_DEVICES_PER_TENANT: "10"
      DEMO_TENANT_PREFIX: demo
      DEMO_PRODUCT_ID: product-demo
      DEMO_TICK_INTERVAL: 250ms
      DEMO_TELEMETRY_BURST_MIN: "1"
      DEMO_TELEMETRY_BURST_MAX: "5"
      DEMO_COMMAND_BURST_MIN: "1"
      DEMO_COMMAND_BURST_MAX: "3"
      LISTEN_ADDR: :8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - prometheus

volumes:
  etcd-data:
