<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Command Lifecycle</title>
  <desc id="desc">A command lifecycle diagram from admin API to device downlink, ACK, and state update.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09111d"/>
      <stop offset="100%" stop-color="#183757"/>
    </linearGradient>
    <linearGradient id="cycle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#80f0b5"/>
      <stop offset="100%" stop-color="#4dd0e1"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg3)"/>
  <text x="60" y="72" fill="#ffffff" font-size="32" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700">命令闭环</text>
  <text x="60" y="106" fill="#b9d0ea" font-size="18" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">创建命令、下发到设备、接收 ACK、更新状态，形成可观测的业务闭环。</text>

  <g filter="url(#shadow3)" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" text-anchor="middle">
    <rect x="70" y="185" width="150" height="78" rx="18" fill="#12304a" stroke="#4dd0e1" stroke-opacity="0.25"/>
    <text x="145" y="227" fill="#ffffff" font-size="20">admin</text>
    <text x="145" y="248" fill="#9ec3e8" font-size="13">创建命令</text>

    <rect x="320" y="185" width="160" height="78" rx="18" fill="#12304a" stroke="#4dd0e1" stroke-opacity="0.25"/>
    <text x="400" y="227" fill="#ffffff" font-size="20">EMQX</text>
    <text x="400" y="248" fill="#9ec3e8" font-size="13">下行投递</text>

    <rect x="590" y="185" width="160" height="78" rx="18" fill="#12304a" stroke="#4dd0e1" stroke-opacity="0.25"/>
    <text x="670" y="227" fill="#ffffff" font-size="20">device</text>
    <text x="670" y="248" fill="#9ec3e8" font-size="13">执行并 ACK</text>

    <rect x="860" y="185" width="160" height="78" rx="18" fill="#12304a" stroke="#4dd0e1" stroke-opacity="0.25"/>
    <text x="940" y="227" fill="#ffffff" font-size="20">worker</text>
    <text x="940" y="248" fill="#9ec3e8" font-size="13">状态更新</text>
  </g>

  <g stroke="url(#cycle)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M220 224 H320"/>
    <path d="M480 224 H590"/>
    <path d="M750 224 H860"/>
    <path d="M940 275 C940 330 300 330 145 275"/>
  </g>
  <g fill="#80f0b5">
    <circle cx="270" cy="224" r="5"/>
    <circle cx="535" cy="224" r="5"/>
    <circle cx="805" cy="224" r="5"/>
    <circle cx="545" cy="330" r="5"/>
  </g>

  <text x="60" y="368" fill="#8fb2d4" font-size="14" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
    这张图强调命令状态机和 ACK 回路，方便使用者理解系统不仅“能下发”，还能“能追踪”。
  </text>
</svg>
