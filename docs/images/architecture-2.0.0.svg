<svg width="1200" height="560" viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">IoT Architecture</title>
  <desc id="desc">Architecture diagram showing devices, EMQX, ingress, Kafka, worker, core-rpc, admin, etcd, and storage services.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101d"/>
      <stop offset="100%" stop-color="#133b5d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17324f"/>
      <stop offset="100%" stop-color="#0d1b2d"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#68e0cf"/>
      <stop offset="100%" stop-color="#8cf3a8"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="560" rx="30" fill="url(#bg2)"/>
  <circle cx="1040" cy="86" r="66" fill="#68e0cf" opacity="0.08"/>
  <circle cx="1060" cy="448" r="110" fill="#8cf3a8" opacity="0.07"/>

  <text x="60" y="70" fill="#ffffff" font-size="34" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="800">
    总体架构
  </text>
  <text x="60" y="104" fill="#bfd3ea" font-size="18" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
    设备流量进入 EMQX，ingress 做标准化和事件解耦，core-rpc 负责核心业务，admin 作为 go-zero 网关。
  </text>

  <g filter="url(#shadow2)" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" text-anchor="middle">
    <rect x="56" y="160" width="1088" height="320" rx="24" fill="#081425" stroke="#68e0cf" stroke-opacity="0.12"/>

    <rect x="82" y="214" width="116" height="74" rx="16" fill="url(#card)" stroke="#68e0cf" stroke-opacity="0.18"/>
    <text x="140" y="247" fill="#ffffff" font-size="20">设备</text>
    <text x="140" y="269" fill="#9fbfdd" font-size="13">MQTT Client</text>

    <rect x="230" y="214" width="130" height="74" rx="16" fill="url(#card)" stroke="#68e0cf" stroke-opacity="0.18"/>
    <text x="295" y="247" fill="#ffffff" font-size="20">EMQX</text>
    <text x="295" y="269" fill="#9fbfdd" font-size="13">接入 / ACL</text>

    <rect x="392" y="214" width="138" height="74" rx="16" fill="url(#card)" stroke="#68e0cf" stroke-opacity="0.18"/>
    <text x="461" y="247" fill="#ffffff" font-size="20">ingress</text>
    <text x="461" y="269" fill="#9fbfdd" font-size="13">校验 / 标准化</text>

    <rect x="560" y="214" width="128" height="74" rx="16" fill="url(#card)" stroke="#68e0cf" stroke-opacity="0.18"/>
    <text x="624" y="247" fill="#ffffff" font-size="20">Kafka</text>
    <text x="624" y="269" fill="#9fbfdd" font-size="13">异步缓冲</text>

    <rect x="716" y="214" width="128" height="74" rx="16" fill="url(#card)" stroke="#68e0cf" stroke-opacity="0.18"/>
    <text x="780" y="247" fill="#ffffff" font-size="20">worker</text>
    <text x="780" y="269" fill="#9fbfdd" font-size="13">消费 / 落库</text>

    <rect x="874" y="190" width="136" height="60" rx="16" fill="#12314a" stroke="#8cf3a8" stroke-opacity="0.22"/>
    <text x="942" y="225" fill="#ffffff" font-size="18">TDengine</text>
    <rect x="874" y="262" width="136" height="60" rx="16" fill="#12314a" stroke="#8cf3a8" stroke-opacity="0.22"/>
    <text x="942" y="297" fill="#ffffff" font-size="18">PostgreSQL</text>

    <rect x="392" y="340" width="138" height="70" rx="16" fill="#143654" stroke="#8cf3a8" stroke-opacity="0.22"/>
    <text x="461" y="372" fill="#ffffff" font-size="20">admin</text>
    <text x="461" y="394" fill="#9fbfdd" font-size="13">go-zero REST</text>

    <rect x="558" y="340" width="140" height="70" rx="16" fill="#143654" stroke="#8cf3a8" stroke-opacity="0.22"/>
    <text x="628" y="372" fill="#ffffff" font-size="20">core-rpc</text>
    <text x="628" y="394" fill="#9fbfdd" font-size="13">gRPC 核心服务</text>

    <rect x="736" y="340" width="110" height="70" rx="16" fill="#163d59" stroke="#8cf3a8" stroke-opacity="0.22"/>
    <text x="791" y="372" fill="#ffffff" font-size="20">etcd</text>
    <text x="791" y="394" fill="#9fbfdd" font-size="13">服务发现</text>

    <rect x="874" y="340" width="136" height="70" rx="16" fill="#163d59" stroke="#8cf3a8" stroke-opacity="0.22"/>
    <text x="942" y="372" fill="#ffffff" font-size="20">Demo</text>
    <text x="942" y="394" fill="#9fbfdd" font-size="13">造流 / ACK</text>
  </g>

  <g stroke="url(#line)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M198 251 H230"/>
    <path d="M360 251 H392"/>
    <path d="M530 251 H560"/>
    <path d="M688 251 H716"/>
    <path d="M844 251 H874"/>
    <path d="M460 288 V340"/>
    <path d="M530 375 H558"/>
    <path d="M698 375 H736"/>
    <path d="M680 375 C760 375 832 375 874 375"/>
    <path d="M530 340 C530 320 570 300 604 300"/>
    <path d="M628 340 V300"/>
    <path d="M628 274 C628 244 676 226 716 226"/>
    <path d="M628 274 C628 226 900 226 874 226"/>
    <path d="M628 410 C628 446 800 446 942 446"/>
  </g>

  <g fill="#68e0cf">
    <circle cx="214" cy="251" r="5"/>
    <circle cx="376" cy="251" r="5"/>
    <circle cx="546" cy="251" r="5"/>
    <circle cx="704" cy="251" r="5"/>
    <circle cx="860" cy="251" r="5"/>
    <circle cx="460" cy="324" r="5"/>
    <circle cx="544" cy="375" r="5"/>
    <circle cx="706" cy="375" r="5"/>
    <circle cx="726" cy="226" r="5"/>
    <circle cx="628" cy="300" r="5"/>
  </g>

  <g font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
    <rect x="60" y="472" width="324" height="52" rx="14" fill="#0e1e33" stroke="#68e0cf" stroke-opacity="0.12"/>
    <text x="82" y="503" fill="#ffffff" font-size="16">接入面</text>
    <text x="150" y="503" fill="#bfd3ea" font-size="14">MQTT -> EMQX -> ingress -> Kafka</text>

    <rect x="404" y="472" width="330" height="52" rx="14" fill="#0e1e33" stroke="#68e0cf" stroke-opacity="0.12"/>
    <text x="426" y="503" fill="#ffffff" font-size="16">核心业务面</text>
    <text x="520" y="503" fill="#bfd3ea" font-size="14">admin -> core-rpc -> etcd</text>

    <rect x="754" y="472" width="386" height="52" rx="14" fill="#0e1e33" stroke="#68e0cf" stroke-opacity="0.12"/>
    <text x="776" y="503" fill="#ffffff" font-size="16">存储与运行面</text>
    <text x="878" y="503" fill="#bfd3ea" font-size="14">worker -> TDengine / PostgreSQL, Demo -> 造流</text>
  </g>
</svg>
