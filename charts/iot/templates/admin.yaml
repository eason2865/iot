{{- if .Values.admin.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: admin
  labels:
    {{- include "iot.labels" . | nindent 4 }}
spec:
  selector:
    app: admin
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  labels:
    {{- include "iot.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            {{- if .Values.externalDependencies.enabled }}
            - >
              until nc -z {{ .Values.externalDependencies.wait.postgresHost }} {{ .Values.externalDependencies.wait.postgresPort }}
              && nc -z {{ .Values.externalDependencies.wait.kafkaHost }} {{ .Values.externalDependencies.wait.kafkaPort }};
              do echo waiting for docker postgres/kafka; sleep 2; done
            {{- else }}
            - >
              until nc -z postgres 5432 && nc -z kafka 9092;
              do echo waiting for postgres/kafka; sleep 2; done
            {{- end }}
      containers:
        - name: admin
          image: {{ .Values.images.app }}
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/admin"]
          envFrom:
            - configMapRef:
                name: iot-common-config
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
{{- end }}
