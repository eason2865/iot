name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l $(find . -path ./.git -prune -o -path ./outputs -prune -o -name '*.go' -print))"

      - name: Test
        run: go test ./...

      - name: Build binaries
        run: make build
