<svg width="1200" height="440" viewBox="0 0 1200 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">IoT Platform Hero</title>
  <desc id="desc">Hero illustration for the IoT platform showing go-zero, gRPC, protobuf, etcd, EMQX, Kafka, TDengine, and PostgreSQL.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101d"/>
      <stop offset="58%" stop-color="#0c2342"/>
      <stop offset="100%" stop-color="#123f62"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#142840" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#0b1626" stop-opacity="0.97"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#68e0cf"/>
      <stop offset="100%" stop-color="#8cf3a8"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17324f"/>
      <stop offset="100%" stop-color="#0e1e33"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1200" height="440" rx="30" fill="url(#bg)"/>
  <circle cx="106" cy="70" r="54" fill="#68e0cf" opacity="0.12"/>
  <circle cx="1080" cy="78" r="26" fill="#8cf3a8" opacity="0.18"/>
  <circle cx="1085" cy="350" r="98" fill="#68e0cf" opacity="0.08"/>
  <circle cx="980" cy="112" r="10" fill="#ffffff" opacity="0.86"/>
  <circle cx="1035" cy="88" r="7" fill="#68e0cf" opacity="0.9"/>

  <rect x="52" y="54" width="1096" height="332" rx="28" fill="url(#panel)" stroke="#68e0cf" stroke-opacity="0.16" filter="url(#shadow)"/>

  <text x="96" y="126" fill="#ffffff" font-size="56" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="800">
    IoT Platform 2.0
  </text>
  <text x="96" y="170" fill="#cde2fb" font-size="24" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
    go-zero + gRPC + protobuf + etcd 的物联网平台骨架
  </text>
  <rect x="96" y="196" width="250" height="8" rx="4" fill="url(#accent)"/>
  <text x="96" y="246" fill="#dce8f3" font-size="18" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
    核心拆分：admin 网关 + core-rpc 核心服务
  </text>
  <text x="96" y="276" fill="#a9c7e6" font-size="16" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
    本地 Docker 已补齐 etcd，Helm / k8s / 文档流程全部对齐
  </text>

  <g font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
    <rect x="96" y="304" width="172" height="34" rx="17" fill="url(#chip)" stroke="#68e0cf" stroke-opacity="0.18"/>
    <text x="182" y="326" text-anchor="middle" fill="#eff7ff" font-size="15">go-zero / REST</text>

    <rect x="282" y="304" width="150" height="34" rx="17" fill="url(#chip)" stroke="#68e0cf" stroke-opacity="0.18"/>
    <text x="357" y="326" text-anchor="middle" fill="#eff7ff" font-size="15">gRPC / proto</text>

    <rect x="446" y="304" width="146" height="34" rx="17" fill="url(#chip)" stroke="#68e0cf" stroke-opacity="0.18"/>
    <text x="519" y="326" text-anchor="middle" fill="#eff7ff" font-size="15">etcd 发现</text>

    <rect x="606" y="304" width="142" height="34" rx="17" fill="url(#chip)" stroke="#68e0cf" stroke-opacity="0.18"/>
    <text x="677" y="326" text-anchor="middle" fill="#eff7ff" font-size="15">MQTT / EMQX</text>
  </g>

  <g transform="translate(640 94)" filter="url(#shadow)" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" text-anchor="middle">
    <rect x="0" y="0" width="474" height="226" rx="24" fill="#081425" stroke="#68e0cf" stroke-opacity="0.18"/>

    <g>
      <rect x="20" y="26" width="86" height="50" rx="14" fill="#12334f"/>
      <text x="63" y="57" fill="#f4fbff" font-size="17">设备</text>

      <rect x="128" y="26" width="90" height="50" rx="14" fill="#143a5a"/>
      <text x="173" y="57" fill="#f4fbff" font-size="17">EMQX</text>

      <rect x="240" y="26" width="100" height="50" rx="14" fill="#163f64"/>
      <text x="290" y="57" fill="#f4fbff" font-size="17">ingress</text>

      <rect x="362" y="26" width="92" height="50" rx="14" fill="#17496d"/>
      <text x="408" y="57" fill="#f4fbff" font-size="17">Kafka</text>

      <rect x="88" y="108" width="102" height="50" rx="14" fill="#15324f"/>
      <text x="139" y="139" fill="#f4fbff" font-size="17">worker</text>

      <rect x="214" y="108" width="100" height="50" rx="14" fill="#163f64"/>
      <text x="264" y="139" fill="#f4fbff" font-size="17">TDengine</text>

      <rect x="338" y="108" width="116" height="50" rx="14" fill="#17496d"/>
      <text x="396" y="139" fill="#f4fbff" font-size="17">PostgreSQL</text>

      <rect x="192" y="170" width="92" height="38" rx="12" fill="#184d67"/>
      <text x="238" y="194" fill="#f4fbff" font-size="15">core-rpc</text>

      <rect x="300" y="170" width="80" height="38" rx="12" fill="#1d5975"/>
      <text x="340" y="194" fill="#f4fbff" font-size="15">etcd</text>
    </g>

    <g stroke="url(#accent)" stroke-width="3" stroke-linecap="round" fill="none">
      <path d="M106 51 H128"/>
      <path d="M218 51 H240"/>
      <path d="M340 51 H362"/>
      <path d="M290 76 V108"/>
      <path d="M214 190 H192"/>
      <path d="M284 190 H300"/>
      <path d="M189 76 C189 92 216 108 238 108"/>
    </g>
    <g fill="#68e0cf">
      <circle cx="117" cy="51" r="4.5"/>
      <circle cx="229" cy="51" r="4.5"/>
      <circle cx="351" cy="51" r="4.5"/>
      <circle cx="290" cy="93" r="4.5"/>
      <circle cx="201" cy="190" r="4.5"/>
      <circle cx="292" cy="190" r="4.5"/>
      <circle cx="238" cy="108" r="4.5"/>
    </g>
  </g>

  <text x="96" y="374" fill="#9db9d8" font-size="14" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
    Release 2.0.0 · 本地 Docker + Helm + etcd · 先拆核心业务，再持续演进
  </text>
</svg>
