{{- if .Values.admin.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: admin
  labels:
    {{- include "iot.labels" . | nindent 4 }}
spec:
  selector:
    app: admin
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9100
      targetPort: 9100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  labels:
    {{- include "iot.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      {{- if and .Values.externalDependencies.enabled .Values.externalDependencies.hostGatewayIP }}
      hostAliases:
        - ip: {{ .Values.externalDependencies.hostGatewayIP | quote }}
          hostnames:
            - host.docker.internal
      {{- end }}
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            {{- if .Values.externalDependencies.enabled }}
            - >
              until nc -z {{ .Values.externalDependencies.wait.etcdHost }} {{ .Values.externalDependencies.wait.etcdPort }};
              do echo waiting for docker etcd; sleep 2; done
            {{- else }}
            - >
              until nc -z etcd 2379;
              do echo waiting for etcd; sleep 2; done
            {{- end }}
      containers:
        - name: admin
          image: {{ .Values.images.app }}
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/admin"]
          envFrom:
            - configMapRef:
                name: iot-common-config
          ports:
            - containerPort: 8080
            - containerPort: 9100
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
{{- end }}
