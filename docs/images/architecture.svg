<svg width="1200" height="620" viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">IoT platform architecture</title>
  <desc id="desc">Layered architecture diagram for the IoT platform.</desc>
  <defs>
    <style>
      .sans { font-family: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
      .title { fill: #132336; font-size: 34px; font-weight: 800; }
      .note { fill: #536f84; font-size: 16px; }
      .band-title { fill: #163047; font-size: 18px; font-weight: 800; }
      .node-title { fill: #17283a; font-size: 17px; font-weight: 800; }
      .node-sub { fill: #61798c; font-size: 13px; }
      .lane { fill: #ffffff; stroke: #d9e8ee; stroke-width: 1.5; }
      .node { fill: #f8fbfd; stroke: #cfdfe8; stroke-width: 1.5; }
      .storage { fill: #f3f8ef; stroke: #c8dfbf; stroke-width: 1.5; }
      .core { fill: #eef6ff; stroke: #bfd8ee; stroke-width: 1.5; }
      .line { stroke: #0f7b8a; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrow); }
      .dashed { stroke: #7aa4b8; stroke-width: 2.5; stroke-dasharray: 7 7; stroke-linecap: round; fill: none; marker-end: url(#arrow2); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#0f7b8a"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#7aa4b8"/>
    </marker>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f7b8a"/>
      <stop offset="1" stop-color="#28a36f"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="620" rx="28" fill="#f6fafc"/>
  <rect x="46" y="36" width="1108" height="548" rx="24" fill="#ffffff" stroke="#dbe8ee"/>
  <rect x="46" y="36" width="1108" height="8" rx="4" fill="url(#top)"/>

  <g class="sans">
    <text class="title" x="72" y="86">总体架构</text>
    <text class="note" x="72" y="118">接入、核心业务和存储职责分离，链路监控通过 metrics、request id 和 trace 上下文串联。</text>

    <rect class="lane" x="72" y="152" width="1056" height="118" rx="18"/>
    <text class="band-title" x="96" y="188">接入与消息解耦</text>
    <rect class="node" x="236" y="176" width="128" height="64" rx="12"/>
    <text class="node-title" x="300" y="204" text-anchor="middle">设备</text>
    <text class="node-sub" x="300" y="225" text-anchor="middle">MQTT Client</text>
    <rect class="node" x="420" y="176" width="128" height="64" rx="12"/>
    <text class="node-title" x="484" y="204" text-anchor="middle">EMQX</text>
    <text class="node-sub" x="484" y="225" text-anchor="middle">接入认证</text>
    <rect class="node" x="604" y="176" width="128" height="64" rx="12"/>
    <text class="node-title" x="668" y="204" text-anchor="middle">ingress</text>
    <text class="node-sub" x="668" y="225" text-anchor="middle">Envelope 标准化</text>
    <rect class="node" x="788" y="176" width="128" height="64" rx="12"/>
    <text class="node-title" x="852" y="204" text-anchor="middle">Kafka</text>
    <text class="node-sub" x="852" y="225" text-anchor="middle">异步缓冲</text>
    <path class="line" d="M364 208 H420"/>
    <path class="line" d="M548 208 H604"/>
    <path class="line" d="M732 208 H788"/>

    <rect class="lane" x="72" y="304" width="1056" height="126" rx="18"/>
    <text class="band-title" x="96" y="344">核心业务服务</text>
    <rect class="core" x="260" y="336" width="154" height="70" rx="12"/>
    <text class="node-title" x="337" y="365" text-anchor="middle">admin</text>
    <text class="node-sub" x="337" y="386" text-anchor="middle">go-zero REST</text>
    <rect class="core" x="508" y="336" width="154" height="70" rx="12"/>
    <text class="node-title" x="585" y="365" text-anchor="middle">core-rpc</text>
    <text class="node-sub" x="585" y="386" text-anchor="middle">gRPC + protobuf</text>
    <rect class="core" x="756" y="336" width="154" height="70" rx="12"/>
    <text class="node-title" x="833" y="365" text-anchor="middle">etcd</text>
    <text class="node-sub" x="833" y="386" text-anchor="middle">服务发现</text>
    <path class="line" d="M414 371 H508"/>
    <path class="dashed" d="M662 371 H756"/>
    <path class="dashed" d="M585 336 V286 C585 270 628 260 668 240"/>

    <rect class="lane" x="72" y="464" width="1056" height="98" rx="18"/>
    <text class="band-title" x="96" y="503">存储与运行</text>
    <rect class="storage" x="260" y="488" width="154" height="48" rx="12"/>
    <text class="node-title" x="337" y="518" text-anchor="middle">TDengine</text>
    <rect class="storage" x="508" y="488" width="154" height="48" rx="12"/>
    <text class="node-title" x="585" y="518" text-anchor="middle">PostgreSQL</text>
    <rect class="storage" x="756" y="488" width="154" height="48" rx="12"/>
    <text class="node-title" x="833" y="518" text-anchor="middle">demo</text>
    <path class="line" d="M852 240 C852 320 337 320 337 488"/>
    <path class="line" d="M852 240 C852 362 585 362 585 488"/>
    <path class="dashed" d="M833 488 C833 452 760 434 668 430"/>
  </g>
</svg>
