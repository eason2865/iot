<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">IoT Platform overview</title>
  <desc id="desc">Overview image for an IoT platform built with go-zero, gRPC, protobuf, etcd, EMQX, Kafka, TDengine, and PostgreSQL.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#edf6f4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f7b8a"/>
      <stop offset="1" stop-color="#28a36f"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#18324a" flood-opacity="0.13"/>
    </filter>
    <style>
      .sans { font-family: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
      .title { fill: #102033; font-size: 48px; font-weight: 800; }
      .subtitle { fill: #35536b; font-size: 23px; font-weight: 600; }
      .body { fill: #506b81; font-size: 17px; }
      .label { fill: #102033; font-size: 17px; font-weight: 700; }
      .hint { fill: #60788d; font-size: 13px; }
      .chip { fill: #ffffff; stroke: #d9e8ee; stroke-width: 1.5; }
      .line { stroke: #0f7b8a; stroke-width: 3; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect x="46" y="44" width="1112" height="332" rx="26" fill="#ffffff" stroke="#dceaf0" filter="url(#shadow)"/>
  <rect x="46" y="44" width="1112" height="8" rx="4" fill="url(#accent)"/>

  <g class="sans">
    <text class="title" x="86" y="122">IoT Platform</text>
    <text class="subtitle" x="86" y="166">面向设备接入、遥测采集、命令闭环和多租户管理</text>
    <text class="body" x="86" y="215">go-zero REST 网关对外提供 API，core-rpc 承载核心业务，etcd 负责服务发现。</text>
    <text class="body" x="86" y="244">EMQX、Kafka、TDengine 和 PostgreSQL 共同支撑接入、解耦、时序与元数据。</text>

    <g transform="translate(86 292)">
      <rect class="chip" x="0" y="0" width="138" height="40" rx="10"/>
      <text class="label" x="69" y="26" text-anchor="middle">go-zero</text>
      <rect class="chip" x="154" y="0" width="128" height="40" rx="10"/>
      <text class="label" x="218" y="26" text-anchor="middle">gRPC</text>
      <rect class="chip" x="298" y="0" width="138" height="40" rx="10"/>
      <text class="label" x="367" y="26" text-anchor="middle">protobuf</text>
      <rect class="chip" x="452" y="0" width="118" height="40" rx="10"/>
      <text class="label" x="511" y="26" text-anchor="middle">etcd</text>
    </g>
  </g>

  <g class="sans" transform="translate(686 96)">
    <rect x="0" y="0" width="426" height="230" rx="22" fill="#f8fbfd" stroke="#d7e7ee"/>
    <g>
      <rect x="34" y="35" width="108" height="48" rx="12" fill="#e4f4f2" stroke="#b7dad5"/>
      <text class="label" x="88" y="65" text-anchor="middle">设备</text>
      <rect x="198" y="35" width="108" height="48" rx="12" fill="#eaf3ff" stroke="#bfd7ef"/>
      <text class="label" x="252" y="65" text-anchor="middle">EMQX</text>
      <line class="line" x1="142" y1="59" x2="198" y2="59"/>
    </g>
    <g>
      <rect x="34" y="116" width="108" height="48" rx="12" fill="#eaf3ff" stroke="#bfd7ef"/>
      <text class="label" x="88" y="146" text-anchor="middle">ingress</text>
      <rect x="198" y="116" width="108" height="48" rx="12" fill="#fff6df" stroke="#ead29b"/>
      <text class="label" x="252" y="146" text-anchor="middle">Kafka</text>
      <rect x="324" y="116" width="58" height="48" rx="12" fill="#eff7ec" stroke="#c9dfbf"/>
      <text class="label" x="353" y="146" text-anchor="middle">worker</text>
      <line class="line" x1="142" y1="140" x2="198" y2="140"/>
      <line class="line" x1="306" y1="140" x2="324" y2="140"/>
    </g>
    <g>
      <rect x="34" y="190" width="108" height="38" rx="10" fill="#f0f4f8" stroke="#cfdce5"/>
      <text class="hint" x="88" y="214" text-anchor="middle">admin API</text>
      <rect x="198" y="190" width="108" height="38" rx="10" fill="#f0f4f8" stroke="#cfdce5"/>
      <text class="hint" x="252" y="214" text-anchor="middle">core-rpc</text>
      <rect x="324" y="190" width="58" height="38" rx="10" fill="#f0f4f8" stroke="#cfdce5"/>
      <text class="hint" x="353" y="214" text-anchor="middle">etcd</text>
      <line class="line" x1="142" y1="209" x2="198" y2="209"/>
      <line class="line" x1="306" y1="209" x2="324" y2="209"/>
    </g>
  </g>
</svg>
