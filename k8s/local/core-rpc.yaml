apiVersion: v1
kind: Service
metadata:
  name: core-rpc
spec:
  selector:
    app: core-rpc
  ports:
    - name: grpc
      port: 9001
      targetPort: 9001
    - name: metrics
      port: 9101
      targetPort: 9101
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-rpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core-rpc
  template:
    metadata:
      labels:
        app: core-rpc
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - >
              until nc -z postgres 5432 && nc -z kafka 9092 && nc -z etcd 2379;
              do echo waiting for postgres/kafka/etcd; sleep 2; done
      containers:
        - name: core-rpc
          image: iot-app:metrics2
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/core-rpc"]
          envFrom:
            - configMapRef:
                name: iot-common-config
          ports:
            - containerPort: 9001
            - containerPort: 9101
          readinessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 15
            periodSeconds: 10
