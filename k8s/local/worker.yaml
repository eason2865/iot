apiVersion: v1
kind: Service
metadata:
  name: worker
spec:
  selector:
    app: worker
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - >
              until nc -z postgres 5432 && nc -z kafka 9092 && nc -z emqx 1883 && nc -z tdengine 6030;
              do echo waiting for postgres/kafka/emqx/tdengine; sleep 2; done
      containers:
        - name: worker
          image: iot-app:metrics2
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/worker"]
          envFrom:
            - configMapRef:
                name: iot-common-config
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
