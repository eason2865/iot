<svg width="1200" height="440" viewBox="0 0 1200 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Command Lifecycle</title>
  <desc id="desc">Command lifecycle diagram showing admin, core-rpc, ingress, EMQX, device, ACK, and status updates.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101d"/>
      <stop offset="100%" stop-color="#163c5d"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17324f"/>
      <stop offset="100%" stop-color="#0c1929"/>
    </linearGradient>
    <linearGradient id="cycle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8cf3a8"/>
      <stop offset="100%" stop-color="#68e0cf"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1200" height="440" rx="30" fill="url(#bg3)"/>
  <circle cx="1045" cy="58" r="42" fill="#8cf3a8" opacity="0.10"/>
  <circle cx="1060" cy="360" r="92" fill="#68e0cf" opacity="0.08"/>

  <text x="60" y="72" fill="#ffffff" font-size="34" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="800">
    命令闭环
  </text>
  <text x="60" y="106" fill="#bfd3ea" font-size="18" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
    创建、下发、ACK、状态更新都要能追踪，避免重复消息和乱序把业务状态带偏。
  </text>

  <g filter="url(#shadow3)" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" text-anchor="middle">
    <rect x="58" y="176" width="140" height="80" rx="18" fill="url(#card3)" stroke="#68e0cf" stroke-opacity="0.18"/>
    <text x="128" y="212" fill="#ffffff" font-size="20">admin</text>
    <text x="128" y="235" fill="#9fbfdd" font-size="13">REST 创建</text>

    <rect x="238" y="176" width="150" height="80" rx="18" fill="url(#card3)" stroke="#68e0cf" stroke-opacity="0.18"/>
    <text x="313" y="212" fill="#ffffff" font-size="20">core-rpc</text>
    <text x="313" y="235" fill="#9fbfdd" font-size="13">生成 / 持久化</text>

    <rect x="430" y="176" width="140" height="80" rx="18" fill="url(#card3)" stroke="#68e0cf" stroke-opacity="0.18"/>
    <text x="500" y="212" fill="#ffffff" font-size="20">ingress</text>
    <text x="500" y="235" fill="#9fbfdd" font-size="13">标准化下发</text>

    <rect x="608" y="176" width="128" height="80" rx="18" fill="url(#card3)" stroke="#68e0cf" stroke-opacity="0.18"/>
    <text x="672" y="212" fill="#ffffff" font-size="20">EMQX</text>
    <text x="672" y="235" fill="#9fbfdd" font-size="13">MQTT 传递</text>

    <rect x="776" y="176" width="132" height="80" rx="18" fill="url(#card3)" stroke="#68e0cf" stroke-opacity="0.18"/>
    <text x="842" y="212" fill="#ffffff" font-size="20">device</text>
    <text x="842" y="235" fill="#9fbfdd" font-size="13">执行命令</text>

    <rect x="950" y="176" width="132" height="80" rx="18" fill="url(#card3)" stroke="#68e0cf" stroke-opacity="0.18"/>
    <text x="1016" y="212" fill="#ffffff" font-size="20">ACK</text>
    <text x="1016" y="235" fill="#9fbfdd" font-size="13">回执更新</text>
  </g>

  <g stroke="url(#cycle)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M198 216 H238"/>
    <path d="M388 216 H430"/>
    <path d="M570 216 H608"/>
    <path d="M736 216 H776"/>
    <path d="M908 216 H950"/>
    <path d="M1016 256 C1016 336 290 336 128 256"/>
    <path d="M313 256 C313 300 500 316 672 316 C796 316 916 292 1016 256"/>
  </g>

  <g fill="#8cf3a8">
    <circle cx="218" cy="216" r="5"/>
    <circle cx="410" cy="216" r="5"/>
    <circle cx="590" cy="216" r="5"/>
    <circle cx="754" cy="216" r="5"/>
    <circle cx="926" cy="216" r="5"/>
    <circle cx="520" cy="316" r="5"/>
    <circle cx="860" cy="316" r="5"/>
  </g>

  <g font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
    <rect x="74" y="300" width="1050" height="78" rx="18" fill="#0d1b2d" stroke="#68e0cf" stroke-opacity="0.12"/>
    <text x="98" y="332" fill="#ffffff" font-size="16">命令状态</text>
    <text x="182" y="332" fill="#bfd3ea" font-size="15">pending</text>
    <text x="256" y="332" fill="#bfd3ea" font-size="15">dispatched</text>
    <text x="352" y="332" fill="#bfd3ea" font-size="15">sent</text>
    <text x="406" y="332" fill="#bfd3ea" font-size="15">acked</text>
    <text x="472" y="332" fill="#bfd3ea" font-size="15">timeout</text>
    <text x="544" y="332" fill="#bfd3ea" font-size="15">failed</text>
    <text x="98" y="356" fill="#9db9d8" font-size="14">关键约束：状态变化需要可幂等、可追踪、可重放，避免重复 ACK 或乱序事件污染业务状态。</text>
  </g>
</svg>
