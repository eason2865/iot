<svg width="1200" height="470" viewBox="0 0 1200 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Command lifecycle</title>
  <desc id="desc">Command lifecycle from admin API to core-rpc, ingress, EMQX, device ACK, Kafka, worker, and storage.</desc>
  <defs>
    <style>
      .sans { font-family: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
      .title { fill: #132336; font-size: 34px; font-weight: 800; }
      .note { fill: #536f84; font-size: 16px; }
      .step { fill: #17283a; font-size: 17px; font-weight: 800; }
      .sub { fill: #61798c; font-size: 13px; }
      .state { fill: #35536b; font-size: 14px; font-weight: 700; }
      .box { fill: #ffffff; stroke: #d6e5ec; stroke-width: 1.5; }
      .primary { fill: #eef6ff; stroke: #bdd8ef; stroke-width: 1.5; }
      .event { fill: #fff7e4; stroke: #ead6a7; stroke-width: 1.5; }
      .done { fill: #eff8ef; stroke: #c8dfbf; stroke-width: 1.5; }
      .line { stroke: #0f7b8a; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrow); }
      .return { stroke: #28a36f; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrow2); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#0f7b8a"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#28a36f"/>
    </marker>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f7b8a"/>
      <stop offset="1" stop-color="#28a36f"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="470" rx="28" fill="#f6fafc"/>
  <rect x="46" y="36" width="1108" height="398" rx="24" fill="#ffffff" stroke="#dbe8ee"/>
  <rect x="46" y="36" width="1108" height="8" rx="4" fill="url(#top)"/>

  <g class="sans">
    <text class="title" x="72" y="86">命令闭环</text>
    <text class="note" x="72" y="118">从创建、下发到 ACK 回执，状态更新需要可幂等、可追踪，并能承受重复和乱序消息。</text>

    <rect class="primary" x="76" y="170" width="138" height="70" rx="14"/>
    <text class="step" x="145" y="199" text-anchor="middle">admin</text>
    <text class="sub" x="145" y="221" text-anchor="middle">REST 创建命令</text>

    <rect class="primary" x="268" y="170" width="138" height="70" rx="14"/>
    <text class="step" x="337" y="199" text-anchor="middle">core-rpc</text>
    <text class="sub" x="337" y="221" text-anchor="middle">持久化与校验</text>

    <rect class="event" x="460" y="170" width="138" height="70" rx="14"/>
    <text class="step" x="529" y="199" text-anchor="middle">Kafka</text>
    <text class="sub" x="529" y="221" text-anchor="middle">命令事件</text>

    <rect class="event" x="652" y="170" width="138" height="70" rx="14"/>
    <text class="step" x="721" y="199" text-anchor="middle">ingress</text>
    <text class="sub" x="721" y="221" text-anchor="middle">标准化下发</text>

    <rect class="event" x="844" y="170" width="138" height="70" rx="14"/>
    <text class="step" x="913" y="199" text-anchor="middle">EMQX</text>
    <text class="sub" x="913" y="221" text-anchor="middle">MQTT 投递</text>

    <rect class="done" x="1036" y="170" width="108" height="70" rx="14"/>
    <text class="step" x="1090" y="199" text-anchor="middle">设备</text>
    <text class="sub" x="1090" y="221" text-anchor="middle">执行</text>

    <path class="line" d="M214 205 H268"/>
    <path class="line" d="M406 205 H460"/>
    <path class="line" d="M598 205 H652"/>
    <path class="line" d="M790 205 H844"/>
    <path class="line" d="M982 205 H1036"/>

    <rect class="box" x="156" y="306" width="178" height="58" rx="13"/>
    <text class="step" x="245" y="331" text-anchor="middle">ACK 回执</text>
    <text class="sub" x="245" y="350" text-anchor="middle">traceId / requestId</text>

    <rect class="box" x="432" y="306" width="178" height="58" rx="13"/>
    <text class="step" x="521" y="331" text-anchor="middle">worker</text>
    <text class="sub" x="521" y="350" text-anchor="middle">状态机更新</text>

    <rect class="box" x="708" y="306" width="220" height="58" rx="13"/>
    <text class="step" x="818" y="331" text-anchor="middle">PostgreSQL / TDengine</text>
    <text class="sub" x="818" y="350" text-anchor="middle">当前态与时序事实</text>

    <path class="return" d="M1090 240 C1090 310 720 292 610 326"/>
    <path class="return" d="M432 335 H334"/>
    <path class="return" d="M610 335 H708"/>
    <path class="return" d="M521 306 C521 278 337 278 337 240"/>
    <path class="return" d="M245 306 C245 276 145 272 145 240"/>

    <rect x="76" y="386" width="1068" height="1" fill="#dbe8ee"/>
    <text class="state" x="92" y="414">状态顺序：</text>
    <text class="sub" x="170" y="414">pending -> dispatched -> sent -> acked / timeout / failed</text>
    <text class="state" x="544" y="414">排障字段：</text>
    <text class="sub" x="624" y="414">tenantId、deviceId、commandId、traceId、requestId</text>
  </g>
</svg>
