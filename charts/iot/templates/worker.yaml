{{- if .Values.worker.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: worker
  labels:
    {{- include "iot.labels" . | nindent 4 }}
spec:
  selector:
    app: worker
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    {{- include "iot.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            {{- if .Values.externalDependencies.enabled }}
            - >
              until nc -z {{ .Values.externalDependencies.wait.postgresHost }} {{ .Values.externalDependencies.wait.postgresPort }}
              && nc -z {{ .Values.externalDependencies.wait.kafkaHost }} {{ .Values.externalDependencies.wait.kafkaPort }}
              && nc -z {{ .Values.externalDependencies.wait.emqxHost }} {{ .Values.externalDependencies.wait.emqxPort }}
              && nc -z {{ .Values.externalDependencies.wait.tdengineHost }} {{ .Values.externalDependencies.wait.tdenginePort }};
              do echo waiting for docker postgres/kafka/emqx/tdengine; sleep 2; done
            {{- else }}
            - >
              until nc -z postgres 5432 && nc -z kafka 9092 && nc -z emqx 1883 && nc -z tdengine 6030;
              do echo waiting for postgres/kafka/emqx/tdengine; sleep 2; done
            {{- end }}
      containers:
        - name: worker
          image: {{ .Values.images.app }}
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/worker"]
          envFrom:
            - configMapRef:
                name: iot-common-config
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
{{- end }}
