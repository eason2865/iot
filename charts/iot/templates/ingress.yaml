{{- if .Values.ingress.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: ingress
  labels:
    {{- include "iot.labels" . | nindent 4 }}
spec:
  selector:
    app: ingress
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress
  labels:
    {{- include "iot.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress
  template:
    metadata:
      labels:
        app: ingress
    spec:
      {{- if and .Values.externalDependencies.enabled .Values.externalDependencies.hostGatewayIP }}
      hostAliases:
        - ip: {{ .Values.externalDependencies.hostGatewayIP | quote }}
          hostnames:
            - host.docker.internal
      {{- end }}
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            {{- if .Values.externalDependencies.enabled }}
            - >
              until nc -z {{ .Values.externalDependencies.wait.postgresHost }} {{ .Values.externalDependencies.wait.postgresPort }}
              && nc -z {{ .Values.externalDependencies.wait.kafkaHost }} {{ .Values.externalDependencies.wait.kafkaPort }}
              && nc -z {{ .Values.externalDependencies.wait.emqxHost }} {{ .Values.externalDependencies.wait.emqxPort }};
              do echo waiting for docker postgres/kafka/emqx; sleep 2; done
            {{- else }}
            - >
              until nc -z postgres 5432 && nc -z kafka 9092 && nc -z emqx 1883;
              do echo waiting for postgres/kafka/emqx; sleep 2; done
            {{- end }}
      containers:
        - name: ingress
          image: {{ .Values.images.app }}
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/ingress"]
          envFrom:
            - configMapRef:
                name: iot-common-config
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
{{- end }}
