<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">IoT Architecture</title>
  <desc id="desc">A pipeline diagram showing device traffic flowing through EMQX, ingress, Kafka, worker, and storage services.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#122b46"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16304f"/>
      <stop offset="100%" stop-color="#0d1e33"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4dd0e1"/>
      <stop offset="100%" stop-color="#80f0b5"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg2)"/>
  <text x="60" y="72" fill="#ffffff" font-size="32" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700">核心架构</text>
  <text x="60" y="106" fill="#b9d0ea" font-size="18" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">设备流量进入 EMQX，经 ingress 标准化后通过 Kafka 解耦，worker 负责落库与下行。</text>

  <g filter="url(#shadow2)" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" text-anchor="middle">
    <rect x="70" y="190" width="128" height="82" rx="18" fill="url(#card)" stroke="#4dd0e1" stroke-opacity="0.20"/>
    <text x="134" y="238" fill="#ffffff" font-size="20">设备</text>

    <rect x="250" y="190" width="128" height="82" rx="18" fill="url(#card)" stroke="#4dd0e1" stroke-opacity="0.20"/>
    <text x="314" y="230" fill="#ffffff" font-size="20">EMQX</text>
    <text x="314" y="252" fill="#9ec3e8" font-size="13">MQTT 接入</text>

    <rect x="430" y="190" width="138" height="82" rx="18" fill="url(#card)" stroke="#4dd0e1" stroke-opacity="0.20"/>
    <text x="499" y="230" fill="#ffffff" font-size="20">ingress</text>
    <text x="499" y="252" fill="#9ec3e8" font-size="13">校验 / 标准化</text>

    <rect x="618" y="190" width="128" height="82" rx="18" fill="url(#card)" stroke="#4dd0e1" stroke-opacity="0.20"/>
    <text x="682" y="230" fill="#ffffff" font-size="20">Kafka</text>
    <text x="682" y="252" fill="#9ec3e8" font-size="13">异步缓冲</text>

    <rect x="796" y="190" width="128" height="82" rx="18" fill="url(#card)" stroke="#4dd0e1" stroke-opacity="0.20"/>
    <text x="860" y="230" fill="#ffffff" font-size="20">worker</text>
    <text x="860" y="252" fill="#9ec3e8" font-size="13">消费 / 落库</text>

    <rect x="974" y="150" width="150" height="66" rx="16" fill="#12304a" stroke="#80f0b5" stroke-opacity="0.25"/>
    <text x="1049" y="190" fill="#ffffff" font-size="18">TDengine</text>
    <rect x="974" y="234" width="150" height="66" rx="16" fill="#12304a" stroke="#80f0b5" stroke-opacity="0.25"/>
    <text x="1049" y="274" fill="#ffffff" font-size="18">PostgreSQL</text>
    <rect x="430" y="330" width="138" height="66" rx="16" fill="#12304a" stroke="#80f0b5" stroke-opacity="0.25"/>
    <text x="499" y="370" fill="#ffffff" font-size="18">admin API</text>
  </g>

  <g stroke="url(#line)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M198 231 H250"/>
    <path d="M378 231 H430"/>
    <path d="M568 231 H618"/>
    <path d="M746 231 H796"/>
    <path d="M924 208 C948 208 954 190 974 190"/>
    <path d="M924 248 C948 248 954 274 974 274"/>
    <path d="M499 272 V330"/>
    <path d="M430 363 H390"/>
  </g>
  <g fill="#4dd0e1">
    <circle cx="224" cy="231" r="5"/>
    <circle cx="404" cy="231" r="5"/>
    <circle cx="594" cy="231" r="5"/>
    <circle cx="772" cy="231" r="5"/>
    <circle cx="938" cy="190" r="5"/>
    <circle cx="938" cy="274" r="5"/>
    <circle cx="499" cy="304" r="5"/>
  </g>
  <text x="60" y="470" fill="#8fb2d4" font-size="14" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
    这张图把“接入层、事件总线、存储层、管理面”分开，读者一眼能看懂系统职责边界。
  </text>
</svg>
